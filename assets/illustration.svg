<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#060A16"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22F1A8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <g opacity="0.2">
    <path d="M0 420H1200" stroke="#1E2C4A" stroke-width="1"/>
    <path d="M0 300H1200" stroke="#1E2C4A" stroke-width="1"/>
    <path d="M0 180H1200" stroke="#1E2C4A" stroke-width="1"/>
    <path d="M0 60H1200" stroke="#1E2C4A" stroke-width="1"/>
  </g>

  <rect x="120" y="80" width="960" height="360" rx="28" fill="#0F172A" stroke="#1F2A44"/>
  <rect x="156" y="120" width="260" height="70" rx="16" fill="#0B1220" stroke="#1E314D"/>
  <rect x="430" y="120" width="220" height="70" rx="16" fill="#0B1220" stroke="#1E314D"/>
  <rect x="664" y="120" width="220" height="70" rx="16" fill="#0B1220" stroke="#1E314D"/>

  <circle cx="190" cy="155" r="10" fill="#22F1A8" filter="url(#softGlow)"/>
  <text x="210" y="160" fill="#CBE9FF" font-family="Oxanium, sans-serif" font-size="16">Uptime Kuma</text>

  <rect x="180" y="230" width="840" height="60" rx="14" fill="#0B1220" stroke="#1E314D"/>
  <rect x="200" y="250" width="160" height="20" rx="10" fill="url(#glow)"/>
  <rect x="380" y="250" width="120" height="20" rx="10" fill="#1E314D"/>
  <rect x="520" y="250" width="120" height="20" rx="10" fill="#1E314D"/>
  <rect x="660" y="250" width="120" height="20" rx="10" fill="#1E314D"/>

  <rect x="180" y="310" width="840" height="90" rx="16" fill="#0B1220" stroke="#1E314D"/>
  <rect x="210" y="336" width="260" height="16" rx="8" fill="#1E314D"/>
  <rect x="210" y="360" width="200" height="12" rx="6" fill="#1A2540"/>

  <rect x="780" y="332" width="110" height="28" rx="14" fill="url(#glow)"/>
  <text x="810" y="352" fill="#05121E" font-family="Oxanium, sans-serif" font-size="12" font-weight="700">UP</text>

  <text x="120" y="52" fill="#8FB6FF" font-family="Red Hat Display, sans-serif" font-size="18">UpKuma Monitor Extension</text>
  <text x="120" y="490" fill="#5E7AA8" font-family="Red Hat Display, sans-serif" font-size="14">Lightweight status dashboard for Uptime Kuma</text>
</svg>
